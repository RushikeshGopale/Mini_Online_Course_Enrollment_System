<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Mini Online Course</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    margin: 0;
    padding: 0;
    background: url('IMG/course.jpeg') no-repeat center center/cover;
    height: 100vh;
    font-family: Arial;
}
.overlay {
    background: rgba(0, 0, 0, 0.6);
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
}
.card-box {
    background: rgba(255, 255, 255, 0.15);
    backdrop-filter: blur(10px);
    padding: 40px;
    border-radius: 20px;
    text-align: center;
    color: white;
    width: 400px;
    box-shadow: 0 0 20px rgba(0,0,0,0.5);
}

.card-box h1 {
    font-weight: bold;
}

.card-box p {
    margin: 15px 0;
    color: #ddd;
}
.start-btn {
    background: orange;
    border: none;
    padding: 12px 25px;
    border-radius: 25px;
    font-size: 18px;
    color: white;
    transition: 0.3s;
}

.start-btn:hover {
    background: darkorange;
}
</style>

</head>

<body>

<div class="overlay">
    <div class="card-box">
        <h1>MiniCourseHub</h1>
        <p>Learn • Grow • Achieve Your Goals</p>

        <a href="login.html">
            <button class="start-btn">Start Learning</button>
        </a>
    </div>
</div>

</body>
</html>
