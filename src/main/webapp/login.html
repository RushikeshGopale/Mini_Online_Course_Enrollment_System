<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="JS/Validation.js"></script>
</head>
<body>

<div class="container">
  <h1 class="text-center mt-5">Login</h1>

  <div class="row w-75 mx-auto mt-4 shadow" style="min-height:400px;">
    <div class="col-md-6 p-0">
      <img src="IMG/loginimg.png" class="img-fluid w-100 h-100" style="object-fit: cover;">
    </div>
    <div class="col-md-6 d-flex align-items-center justify-content-center">
      <form class="w-75">

        <div class="mb-3">
          <label>Email address</label>
         <input type="email" class='form-control' id='email' onkeyup='validateEmail()'>
        </div>
        
         <div id='msg' style='font-size:14px; margin-top:5px;'>
         
         </div>

        <div class="mb-3">
          <label>Password</label>
          <input type="password" class="form-control">
        </div>
        <div class="mb-3">
          <select class="form-control">
            <option>select</option>
            <option value='admin'>Admin</option>
            <option value='User'>Student</option>
          </select>
        </div>

        <button type="submit" class="btn btn-primary w-100">Submit</button>

      </form>
    </div>

  </div>
</div>
</body>
</html>
