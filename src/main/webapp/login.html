<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="JS/Validation.js"></script>
</head>
<style>
body {
    margin: 0;
    padding: 0;
    background: url('IMG/course.jpeg') no-repeat center center/cover;
    height: 100vh;
    font-family: Arial;
}
</style>
<body>

<div class="container">

  <div class="row w-75 mx-auto mt-5 shadow" style="min-height:400px; background-color: white;">
    <div class="col-md-6 p-0">
      <img src="IMG/loginimg.png" class="img-fluid w-100 h-100" style="object-fit: cover;">
    </div>
    <div class="col-md-6 d-flex align-items-center justify-content-center">
      <form class="w-75" action="ValidateServlet" method="post" onsubmit="return validatuser()">

        <div class="mb-3">
        <h1 class="text-center">Login</h1>
          <label>Email address</label>
         <input type="email" class='form-control' id='email' name="email" onkeyup='validateEmail()'>
        </div>
        
         <div id='msg' style='font-size:14px; margin-top:5px;'>
         
         </div>

        <div class="mb-3">
          <label>Password</label>
          <input type="password" id="pass" name="password" class="form-control" onkeyup='validatepass()'>
        </div>
        <div id="passmsg" style='font-size:14px; margin-top:5px;'>
        </div>
        
        <div class="mb-3">
          <label>Login</label>
<input type="submit" id="login" class="form-control btn btn-primary" value="Login">
        </div>
        
        <div>
              <p class="mt-4">
                Don't have an account? 
                <a href="register.html" class="text-black-50 fw-bold">Register Now</a>
              </p>
            </div>
      </form>
    </div>

  </div>
</div>
</body>
</html>
